services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    # DB_PLATFORM is auto-detected and written to .env by scripts/setup.sh
    # (and scripts/setup.ps1). It pins the build/runtime to the host arch
    # so Apple Silicon Macs get native arm64 (no Rosetta) and Intel/Windows
    # hosts get amd64. If you run `docker compose up` directly without the
    # setup script, the fallback is linux/amd64 (works everywhere, but
    # emulated on Apple Silicon — re-run setup.sh to fix).
    platform: ${DB_PLATFORM:-linux/amd64}
    container_name: housing-map-db
    shm_size: "1g"
    environment:
      POSTGRES_DB: housing_map
      POSTGRES_USER: housing_user
      POSTGRES_PASSWORD: housing_pass
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts:/scripts:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U housing_user -d housing_map"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: housing-map-server
    environment:
      PORT: 5050
      CORS_ORIGIN: http://localhost:5173
      DATABASE_URL: postgres://housing_user:housing_pass@db:5432/housing_map
      DATA_DIR: /data
      ZOOM_THRESHOLD: ${ZOOM_THRESHOLD:-8}
      TFL_APP_ID: ${TFL_APP_ID}
      TFL_APP_KEY: ${TFL_APP_KEY}
      EPC_API_EMAIL: ${EPC_API_EMAIL}
      EPC_API_KEY: ${EPC_API_KEY}
      EPC_CACHE_TTL_DAYS: ${EPC_CACHE_TTL_DAYS:-30}
      # Commute (OpenRouteService). These MUST be forwarded here, not relied on
      # via server/.env + dotenv — adapters/commute.js captures env vars at
      # module-load time, before dotenv.config() runs, so a value only present
      # in /app/.env arrives too late and the adapter sends requests without
      # an Authorization header.
      ORS_API_KEY: ${ORS_API_KEY}
      COMMUTE_COST_PER_KM: ${COMMUTE_COST_PER_KM:-0.35}
      COMMUTE_DAYS_PER_WEEK: ${COMMUTE_DAYS_PER_WEEK:-5}
      COMMUTE_CACHE_TTL_DAYS: ${COMMUTE_CACHE_TTL_DAYS:-30}
      COMMUTE_MAX_ORIGINS: ${COMMUTE_MAX_ORIGINS:-120}
      COMMUTE_BATCH_SIZE: ${COMMUTE_BATCH_SIZE:-50}
    ports:
      - "5050:5050"
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: housing-map-web
    environment:
      VITE_MAP_STYLE_URL: ${VITE_MAP_STYLE_URL}
      VITE_API_PROXY_URL: http://server:5050
      VITE_ZOOM_THRESHOLD: ${VITE_ZOOM_THRESHOLD:-8}
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - server

volumes:
  pgdata:
